<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Sign In</title>
  <meta name="description" content="Join Pulse — share moments, connect with people, and discover what's happening around the world." />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="bg-animated"></div>

  <div class="auth-page">
    <div class="auth-container">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">⚡</div>
        <h1><span>Pulse</span></h1>
        <p>Connect. Share. Discover.</p>
      </div>

      <!-- Auth Card -->
      <div class="auth-card">
        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="login-username">Username</label>
            <input class="input" id="login-username" type="text" placeholder="Enter your username" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input class="input" id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary w-full" type="submit" id="login-btn">
            <span>Sign In</span>
          </button>
          <p class="auth-divider">Don't have an account? <a href="#" onclick="switchTab('register'); return false;" style="color:var(--accent-1);">Create one</a></p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label" for="reg-username">Username</label>
            <input class="input" id="reg-username" type="text" placeholder="Choose a username" autocomplete="username" required minlength="3" />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input class="input" id="reg-email" type="email" placeholder="your@email.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <input class="input" id="reg-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password" required minlength="6" />
          </div>
          <button class="btn btn-primary w-full" type="submit" id="register-btn">
            <span>Create Account</span>
          </button>
          <p class="auth-divider">Already have an account? <a href="#" onclick="switchTab('login'); return false;" style="color:var(--accent-1);">Sign in</a></p>
        </form>
      </div>

    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
